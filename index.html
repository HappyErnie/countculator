<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countculator</title>
    <!-- link Files -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Preconnect speeds up the connection to Google Fonts servers -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet"> -->
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.webmanifest">
</head>
<body>
    <div id="countculator">
        <h1 class="main-title">COUNTCULATOR</h1>
        <!-- Display Numbers -->
        <input type="text" id="equation" readonly>
        <input type="text" id="display" placeholder="0" value="0" readonly>
        <!-- keypad -->
        <div id="keypad">
            <button onclick="display('7')">7</button>
            <button onclick="display('8')">8</button>
            <button onclick="display('9')" >9</button>
            <button onclick="operators('/')" class="Special-Brown">/</button>

            <button onclick="display('4')">4</button>
            <button onclick="display('5')">5</button>
            <button onclick="display('6')">6</button>
            <button onclick="operators('*')" class="Special-Brown">x</button>

            <button onclick="display('1')">1</button>
            <button onclick="display('2')">2</button>
            <button onclick="display('3')">3</button>
            <button onclick="operators('-')" class="Special-Brown">-</button>

            <button onclick="operators('+/-')">&#177;</button>
            <button onclick="display('0')">0</button>
            <button onclick="operators('.')">.</button>
            <button onclick="operators('+')" class="Special-Brown">+</button>

            <button onclick="reset()" id="Clear" class="Special-Red">C</button>
            <button onclick="resetEntry()" class="Special-Red">CE</button>
            <button onclick="removeCharacter()" class="Special-Red">
                <i class="fas fa-backspace"></i>
            </button>
            <button onclick="calculate()" id="equal" class="Special-Purple">=</button>
        </div>
    </div>
</body>
    <script src="script.js"></script>
</html>
